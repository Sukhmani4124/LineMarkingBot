pid_velocity_controller:
  ros__parameters:

    # ── Linear velocity PID (forward/backward) ─────────────────────────────
    # Kp: how aggressively to correct speed error
    # Ki: removes steady-state error (e.g., robot slightly slower than commanded)
    # Kd: damps oscillation
    linear:
      kp: 0.2
      ki: 0.5
      kd: 0.0
      integral_limit: 2.0   # anti-windup cap (m/s · s)
      max_output: 2.5       # m/s — clamp PID output

    # ── Angular velocity PID (turning) ────────────────────────────────────
    angular:
      kp: 0.2
      ki: 0.5
      kd: 0.0
      integral_limit: 2.0   # anti-windup cap (rad/s · s)
      max_output: 2.5       # rad/s — clamp PID output

    # ── General ───────────────────────────────────────────────────────────
    control_rate_hz: 50.0   # PID loop frequency
    deadband: 0.01          # velocities below this are treated as zero
